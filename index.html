<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Calculator</title>
    <!-- External links -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous"> -->
    <!-- Internal links -->
    <link rel="stylesheet" href="/resources/css/style.css">
    <link rel="stylesheet" href="/resources/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar" style="background-color: #e3f2fd;">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                Financial Calculator
            </a>
        </div>
    </nav>

    <!-- Expense approximation -->
    <div class="container expenses">
        <form action="#">
            <h3 class="section-header">Study costs</h3>
            <div class="row">
                <!-- Radio inputs and reset button -->
                <div class="col-4 bg-custom">
                    <label for="exampleFormControlSelect1">International or Domestic?</label>
                    <div class="radio-inputs locality">
                        
                        <div class="form-check form-check-inline cost-radio">
                            <input class="form-check-input course-fee total-fee" type="radio" name="localityOptions" id="domestic" value="Domestic" checked="checked">
                            <label class="form-check-label" for="domestic">Domestic Student</label>
                        </div>
                        <div class="form-check form-check-inline cost-radio">
                            <input class="form-check-input course-fee total-fee" type="radio" name="localityOptions" id="international" value="International">
                            <label class="form-check-label" for="international">International Student</label>
                        </div>
                    </div>
                    <br>
                    <label for="exampleFormControlSelect1">Will you rent near campus?</label>
                    <div class="radio-inputs rent">
                        <div class="form-check form-check-inline cost-radio">
                            <input class="form-check-input accommodation-fee total-fee" type="radio" name="rentOptions" id="renting" value="yes" checked="checked">
                            <label class="form-check-label" for="renting">Yes</label>
                        </div>
                        <div class="form-check form-check-inline cost-radio">
                            <input class="form-check-input accommodation-fee total-fee" type="radio" name="rentOptions" id="notRenting" value="no">
                            <label class="form-check-label" for="notRenting">No</label>
                        </div>
                    </div>
                    <div class="reset-button">
                        <div class="d-grid gap-2">
                            <button id="reset-costs" class="btn btn-outline-primary" type="button">Reset Study Costs</button>
                        </div>
                    </div>
                </div>
                <!-- Select boxes -->
                <div class="col-4 bg-custom">
                    <label for="exampleFormControlSelect1">University preference</label>
                    <select class="form-control" id="uniPref">
                        <option>Select...</option>
                    </select>
                    <label for="exampleFormControlSelect1">Subject</label>
                    <select class="form-control course-fee total-fee" id="subject" disabled>
                        <option>Select...</option>
                    </select>
                    <label for="exampleFormControlSelect1">Campus</label>
                    <select class="form-control accommodation-fee total-fee" id="campus" disabled>
                        <option>Select...</option>
                    </select>
                </div>
                <!-- Results display -->
                <div class="col-4 cost-results">
                    <p>
                        Course Fees: <span class="cost-span" id="course"></span>
                    </p>
                    <p>
                        Accommodation Fees: <span class="cost-span" id="accommodation"></span>
                    </p>
                    <p>
                        Total Annual Costs: <span class="cost-span" id="total"></span>
                    </p>
                </div>
            </div>
        </form>
    </div>

    <!-- Questionaire -->
    <div class="questionaire">

    </div>
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" integrity="sha512-894YE6QWD5I59HgZOGReFYm4dnWc1Qt5NtvYSaNcOP+u1T9qYdvdihz0PPSiiqn/+/3e7Jo4EaG7TubfWGUrMQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script> -->
    <script src="/resources/js/jquery.js"></script>
    <!-- Local -->
    <script src="./resources/Data/UniversityFees.json"></script>
    <script src="resources/Data/CostData.json"></script>
    <script src="./resources/js/index.js"></script>
</body>
</html>
